<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>o711 裝飲料水位計算器</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 600px; margin: 20px auto; padding: 20px; background-color: #f4f4f9; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { color: #333; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="number"], input[type="text"] { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #0056b3; }
        #result { margin-top: 20px; padding: 15px; border-radius: 4px; display: none; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .log { font-size: 0.9em; color: #666; margin-top: 10px; border-top: 1px dashed #ccc; padding-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>裝飲料水位上升計算器</h2>
    <p>根據 APCS o711 題目邏輯設計 [1]</p>
    
    <div class="input-group">
        <label>杯子規格 (w1, w2, h1, h2):</label>
        <div style="display: flex; gap: 10px;">
            <input type="number" id="w1" placeholder="w1" title="下方底寬">
            <input type="number" id="w2" placeholder="w2" title="上方底寬">
            <input type="number" id="h1" placeholder="h1" title="下方高度">
            <input type="number" id="h2" placeholder="h2" title="上方高度">
        </div>
    </div>

    <div class="input-group">
        <label>倒入次數 (n):</label>
        <input type="number" id="n_pours" placeholder="例如: 3">
    </div>

    <div class="input-group">
        <label>每次倒入容量 (用逗點或空格隔開):</label>
        <input type="text" id="volumes" placeholder="例如: 20, 30, 50">
    </div>

    <button onclick="calculateMaxRise()">計算最大上升量</button>

    <div id="result">
        <strong>計算結果：</strong> <span id="maxRiseValue">0</span> cm
        <div id="log" class="log"></div>
    </div>
</div>

<script>
    function calculateMaxRise() {
        const w1 = parseInt(document.getElementById('w1').value);
        const w2 = parseInt(document.getElementById('w2').value);
        const h1 = parseInt(document.getElementById('h1').value);
        const h2 = parseInt(document.getElementById('h2').value);
        const n = parseInt(document.getElementById('n_pours').value);
        const volInput = document.getElementById('volumes').value;
        
        if (!w1 || !w2 || !h1 || !h2 || !n || !volInput) {
            alert("請填寫所有欄位");
            return;
        }

        const pours = volInput.split(/[\s,]+/).map(Number).filter(v => !isNaN(v));
        
        const area1 = w1 * w1;
        const area2 = w2 * w2;
        const volLimit1 = area1 * h1;
        const volMax = volLimit1 + (area2 * h2);

        let currentTotalVol = 0;
        let currentHeight = 0;
        let maxRise = 0;
        let logHtml = "<strong>倒水過程：</strong><br>";

        for (let i = 0; i < Math.min(n, pours.length); i++) {
            let v = pours[i];
            let oldHeight = currentHeight;
            
            // 加入飲料，但不超過總容量
            currentTotalVol = Math.min(volMax, currentTotalVol + v);
            
            let newHeight = 0;
            if (currentTotalVol <= volLimit1) {
                newHeight = currentTotalVol / area1;
            } else {
                newHeight = h1 + (currentTotalVol - volLimit1) / area2;
            }

            let rise = newHeight - oldHeight;
            if (rise > maxRise) maxRise = rise;
            
            logHtml += `第 ${i+1} 次: 倒入 ${v}, 水位 ${oldHeight} -> ${newHeight} (上升 ${rise})<br>`;
            currentHeight = newHeight;
        }

        const resultDiv = document.getElementById('result');
        resultDiv.style.display = 'block';
        resultDiv.className = 'success';
        document.getElementById('maxRiseValue').innerText = maxRise;
        document.getElementById('log').innerHTML = logHtml;
    }
</script>

</body>
</html>
